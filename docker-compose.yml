services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: partneros
      POSTGRES_PASSWORD: partneros
      POSTGRES_DB: partneros
    # Host 5435 avoids conflict with WSL/local Postgres on Windows :5432.
    # Manual uvicorn on host: DATABASE_URL=...@127.0.0.1:5435/partneros
    # In-compose backend service still uses @db:5432 (internal network).
    ports:
      - "5435:5432"
    volumes:
      - partneros_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partneros -d partneros"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://partneros:partneros@db:5432/partneros
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - partneros_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  partneros_pgdata:
  partneros_uploads:
